name: Publish NuGet

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build -c Release --no-restore

      - name: Test
        run: dotnet test -c Release --no-build

      - name: Pack
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}

          dotnet pack \
            src/DotEnv.Core.csproj \
            -c Release \
            --no-build \
            -p:Version=$VERSION

          dotnet pack \
            plugins/Microsoft.Extensions.DI/src/DotEnv.Extensions.Microsoft.DI.csproj \
            -c Release \
            --no-build \
            -p:Version=$VERSION

          dotnet pack \
            plugins/Microsoft.Extensions.Config/src/DotEnv.Extensions.Microsoft.Configuration.csproj \
            -c Release \
            --no-build \
            -p:Version=$VERSION

      - name: NuGet login
        uses: NuGet/login@v1
        id: login
        with:
          user: pochi

      - name: Publish
        run: |
          dotnet nuget push \
            src/DotEnv.Core.csproj/bin/Release/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

          dotnet nuget push \
            plugins/Microsoft.Extensions.DI/src/bin/Release/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json

          dotnet nuget push \
            plugins/Microsoft.Extensions.Config/src/bin/Release/*.nupkg \
            --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json